<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Code Reviewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; }
    header span { font-size: 1.6rem; }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 65px);
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d3148;
    }

    .panel-header {
      padding: 12px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #editor-container {
      flex: 1;
      overflow: hidden;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #3d3f5c; color: #64748b; cursor: not-allowed; }

    .output-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Score */
    .score-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .score-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .score-high   { background: #14532d; color: #4ade80; border: 2px solid #4ade80; }
    .score-medium { background: #713f12; color: #fbbf24; border: 2px solid #fbbf24; }
    .score-low    { background: #7f1d1d; color: #f87171; border: 2px solid #f87171; }

    .score-label { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }

    /* Issues */
    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .issue-item {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-left: 3px solid #f87171;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 0.88rem;
    }

    .issue-item.Performance { border-left-color: #fbbf24; }
    .issue-item.Security    { border-left-color: #f87171; }
    .issue-item.Style       { border-left-color: #60a5fa; }
    .issue-item.Bug         { border-left-color: #f87171; }
    .issue-item.Maintainability { border-left-color: #a78bfa; }

    .issue-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .badge-line    { background: #1e293b; color: #94a3b8; }
    .badge-type    { background: #312e81; color: #a5b4fc; }

    /* Suggestions */
    .suggestion-item {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 0.88rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .suggestion-item::before { content: "💡"; flex-shrink: 0; }

    /* Improved code */
    .code-block {
      background: #0d1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      overflow-x: auto;
      white-space: pre;
      color: #e2e8f0;
      max-height: 300px;
      overflow-y: auto;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value { font-size: 1.4rem; font-weight: 700; color: #6366f1; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    .section { margin-bottom: 24px; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 16px;
      color: #64748b;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2d3148;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #334155;
      font-size: 0.95rem;
      flex-direction: column;
      gap: 8px;
    }

    .placeholder-icon { font-size: 3rem; }
  </style>
</head>
<body>

<header>
  <span>🤖</span>
  <h1>AI Code Reviewer</h1>
</header>

<div class="container">
  <!-- Left: Editor -->
  <div class="panel">
    <div class="panel-header">
      <span>Java Code Input</span>
      <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeCode()">
        ▶ Analyze
      </button>
    </div>
    <div id="editor-container"></div>
  </div>

  <!-- Right: Output -->
  <div class="output-panel">
    <div class="panel-header">
      <span>Review Output</span>
    </div>
    <div class="output-content" id="output">
      <div class="placeholder">
        <div class="placeholder-icon">🔍</div>
        <div>Paste your Java code and click Analyze</div>
      </div>
    </div>
  </div>
</div>

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
  let editor;

  require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
  require(['vs/editor/editor.main'], function () {
    editor = monaco.editor.create(document.getElementById('editor-container'), {
      value: `public class Example {\n    public String buildMessage(String[] words) {\n        String result = "";\n        for (int i = 0; i < words.length; i++) {\n            for (int j = 0; j < words[i].length(); j++) {\n                result += words[i].charAt(j);\n            }\n            result += " ";\n        }\n        return result;\n    }\n}`,
      language: 'java',
      theme: 'vs-dark',
      fontSize: 14,
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      automaticLayout: true,
      fontFamily: "'Fira Code', 'Consolas', monospace",
      fontLigatures: true,
    });
  });

  async function analyzeCode() {
    const code = editor.getValue().trim();
    if (!code) return;

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Analyzing...';

    document.getElementById('output').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>Analyzing your code with AI...</div>
      </div>`;

    try {
      const res = await fetch('http://localhost:8080/api/review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Server error');
      }

      const data = await res.json();
      renderOutput(data);
    } catch (e) {
      document.getElementById('output').innerHTML = `
        <div style="padding:20px; color:#f87171;">
          <strong>Error:</strong> ${e.message}
        </div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '▶ Analyze';
    }
  }

  function scoreClass(score) {
    if (score >= 75) return 'score-high';
    if (score >= 50) return 'score-medium';
    return 'score-low';
  }

  function renderOutput(data) {
    const info = data.parsedInfo || {};
    const issues = data.issues || [];
    const suggestions = data.suggestions || [];

    const issuesHtml = issues.length
      ? issues.map(i => `
          <div class="issue-item ${i.type}">
            <div class="issue-meta">
              <span class="badge badge-line">Line ${i.line}</span>
              <span class="badge badge-type">${i.type}</span>
            </div>
            <div>${i.message}</div>
          </div>`).join('')
      : '<div style="color:#64748b; font-size:0.88rem;">No issues found 🎉</div>';

    const suggestionsHtml = suggestions.length
      ? suggestions.map(s => `<div class="suggestion-item">${s}</div>`).join('')
      : '<div style="color:#64748b; font-size:0.88rem;">No suggestions</div>';

    document.getElementById('output').innerHTML = `
      <div class="score-card">
        <div class="score-circle ${scoreClass(data.score)}">${data.score}</div>
        <div>
          <div style="font-size:1.1rem; font-weight:600;">Code Quality Score</div>
          <div class="score-label">Combined AI + static analysis</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${info.methodCount ?? '-'}</div>
          <div class="stat-label">Methods</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${info.cyclomaticComplexity ?? '-'}</div>
          <div class="stat-label">Complexity</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${info.nestedLoopCount ?? '-'}</div>
          <div class="stat-label">Nested Loops</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Issues (${issues.length})</div>
        ${issuesHtml}
      </div>

      <div class="section">
        <div class="section-title">Suggestions</div>
        ${suggestionsHtml}
      </div>

      ${data.improvedCode ? `
      <div class="section">
        <div class="section-title">Improved Code</div>
        <div class="code-block">${escapeHtml(data.improvedCode)}</div>
      </div>` : ''}
    `;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
